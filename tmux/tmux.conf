#: General
# ---------------------------------------------------------------------------

# Start window and pane indexing at 1, not 0
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# Activity alerts
setw -g monitor-activity on
set -g visual-activity on

set -g history-limit 10000
set -g mouse on


#: Plugins
# ---------------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Keymaps
# <prefix> + I (Install)
# <prefix> + U (Update)
# <prefix> + alt + u (Uninstall)


#: Plugins config
# ---------------------------------------------------------------------------

# Automatically restore the last saved environment when starting tmux
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Also restore vim/nvim sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'


#: Theme (catppuccin)
# ---------------------------------------------------------------------------

set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha

# Window tabs: flat (no rounding), showing the directory basename with a
# coloured index (blue when inactive, peach when active). These must be set
# before catppuccin is loaded so the window-status format picks them up.
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_text ' #{b:pane_current_path}'
set -g @catppuccin_window_current_text ' #{b:pane_current_path}'
set -g @catppuccin_window_number_color '#{@thm_blue}'
set -g @catppuccin_window_current_number_color '#{@thm_peach}'
set -g @catppuccin_window_text_color '#{@thm_surface_0}'
set -g @catppuccin_window_current_text_color '#{@thm_mantle}'

# Load catppuccin now (not via tpm) so its colours and modules exist before we
# build the status line below. Unlike v1, catppuccin v2 does not hardcode
# status-right, so we own it and can order segments freely.
run '~/.tmux/plugins/tmux/catppuccin.tmux'


#: Status line
# ---------------------------------------------------------------------------

set -g status-left ''

# Today's next Calendar event, leftmost. Self-styles, warms from blue toward
# red as the meeting approaches, and prints nothing once the day is clear. It
# renders from a cache and refreshes Calendar in the background, so the slow
# AppleScript query never stalls the status line.
set -g status-right '#($HOME/.tmux/next-meeting.sh)'

# Currently-playing macOS Music track, to the LEFT of the window/session
# segments. The script self-styles and prints nothing when Music is stopped or
# closed, so the segment simply disappears. It refreshes every status-interval
# (5s).
set -ag status-right '#($HOME/.tmux/now-playing.sh)'

# Window name (pink) then session name (green, red while the prefix is held).
# Each segment is a left-capped pill: a rounded leading cap, a tight icon, then
# the text. The /@@*_ICON@@ tokens are Nerd Font glyphs injected as raw
# bytes by sed at edit time (editors that drop private-use chars would blank
# them):  = U+E0B6 (rounded cap),  = U+F1AE (window),
#  = U+E795 (session). Codepoints reused from catppuccin's own
# status modules so the font is guaranteed to have them.
set -ag status-right '#[fg=#f5c2e7,bg=#313244]#[fg=#11111b,bg=#f5c2e7] #[fg=#cdd6f4,bg=#313244] #W '
set -ag status-right '#[fg=#{?client_prefix,#f38ba8,#a6e3a1},bg=#313244]#[fg=#11111b,bg=#{?client_prefix,#f38ba8,#a6e3a1}] #[fg=#cdd6f4,bg=#313244] #S '

set -g status-right-length 200


#: Custom Key bindings
# ---------------------------------------------------------------------------

# Change the prefix
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using <prefix>h and <prefix>v
bind h split-window -v  -c '#{pane_current_path}'
bind v split-window -h  -c '#{pane_current_path}'
unbind '"'
unbind %

# clear screen (https://github.com/christoomey/vim-tmux-navigator#restoring-clear-screen-c-l)
bind C-l send-keys 'C-l'

# reload config
bind r source-file ~/.tmux.conf\; display-message "tmux config reloaded"

# Bind b to turn off/on status bar
bind b set-option status

# Kill panes and sessions quickly
unbind x
bind x kill-pane
bind X kill-session

# Resize panes with vim-like key bindings
bind-key -r H resize-pane -L
bind-key -r J resize-pane -D
bind-key -r K resize-pane -U
bind-key -r L resize-pane -R

# Reorder windows left and right
bind-key S-Left swap-window -t -1\; select-window -t -1
bind-key S-Right swap-window -t +1\; select-window -t +1

# Popups
bind C-h popup -E -w "90%" -h "75%" "htop"
bind C-g popup -E -d "#{pane_current_path}" -w "90%" -h "75%" "lazygit"

# Navigate between splits using Alt + arrow keys
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D


#: Plugin manager init
# ---------------------------------------------------------------------------

# Keep this at the very bottom: tpm loads the remaining plugins and lets
# tmux-continuum prepend its save hook on top of the status line we built.
run '~/.tmux/plugins/tpm/tpm'
