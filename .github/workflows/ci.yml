name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC — uncached fresh-machine simulation
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip the Homebrew cache (simulates fresh machine)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set DOTFILES env var
        run: |
          echo "DOTFILES=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          ln -sf "$GITHUB_WORKSPACE" "$HOME/.dotfiles"

      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
          fi
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Cache Homebrew packages (macOS)
        if: runner.os == 'macOS' && github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.skip_cache)
        uses: actions/cache@v4
        with:
          # Only cache downloads, not the installed Cellar: the runner ships a
          # preinstalled Homebrew, and restoring cached kegs on top of it
          # leaves them present-but-unregistered, which breaks `brew bundle`'s
          # pour step ("File exists" / "No such keg"). Caching downloads still
          # skips re-fetching bottles while installing cleanly each run.
          path: |
            ~/Library/Caches/Homebrew
          key: brew-macos-v2-${{ hashFiles('brew/Brewfile.common', 'brew/Brewfile.darwin') }}
          restore-keys: brew-macos-v2-

      - name: Cache Homebrew packages (Linux)
        if: runner.os == 'Linux' && github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.skip_cache)
        uses: actions/cache@v4
        with:
          # Only cache downloads, not the installed Cellar: the runner ships a
          # preinstalled Linuxbrew, and restoring cached kegs on top of it
          # leaves them present-but-unregistered, which breaks `brew bundle`'s
          # upgrade step ("File exists" / "No such keg"). Caching downloads
          # still skips re-fetching bottles while installing cleanly each run.
          path: |
            ~/.cache/Homebrew
          key: brew-linux-v2-${{ hashFiles('brew/Brewfile.common') }}
          restore-keys: brew-linux-v2-

      - name: Install bats-core
        run: |
          brew install bats-core
          brew link --overwrite bats-core

      - name: Trust third-party taps
        # Homebrew refuses to load formulae from non-official taps when
        # HOMEBREW_REQUIRE_TAP_TRUST is set (the default in CI), which fails
        # `brew bundle` on the agavra/tap/tuicr formula. Trust it up front.
        run: |
          brew tap agavra/tap
          brew trust --formula agavra/tap/tuicr

      - name: Run install
        run: ./install
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests
        run: bats tests/
